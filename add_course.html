    <main>
        <div class="form-container">
            <h2>Add Course</h2>
            
            <form>
                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" placeholder="Enter course name" required>
                </div>

                <div class="form-group">
                    <label>Instructor</label>
                    <input type="text" placeholder="Enter instructor name" required>
                </div>

                <div class="form-group">
                    <label>Schedule</label>
                    <input type="text" placeholder="e.g. Sun & Tue - 10:00 AM">
                </div>

                <div class="form-group">
                    <label>Credit Hours</label>
                    <input type="number" min="1" max="6" class="credit-hours" placeholder="Enter credit hours">
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea placeholder="Any additional notes..."></textarea>
                </div>

                <button type="submit">Add Course</button>
            </form>
        </div>



    </main>
